name: Publish to PyPI

on:
  push:
    branches: [main, master]

jobs:
  publish:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: astral-sh/setup-uv@v6

      - name: Bump patch version
        run: |
          CURRENT=$(grep '^version' pyproject.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          IFS='.' read -r major minor patch <<< "$CURRENT"
          NEW="$major.$minor.$((patch + 1))"
          sed -i "s/^version = \"$CURRENT\"/version = \"$NEW\"/" pyproject.toml
          sed -i "s/__version__ = \"$CURRENT\"/__version__ = \"$NEW\"/" perplexity_subscription_mcp/__init__.py
          echo "VERSION=$NEW" >> $GITHUB_ENV
          echo "Bumped $CURRENT → $NEW"

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml perplexity_subscription_mcp/__init__.py
          git commit -m "v${{ env.VERSION }} [skip ci]"
          git tag "v${{ env.VERSION }}"
          git push && git push --tags

      - name: Build and publish
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.UV_PUBLISH_TOKEN }}
        run: |
          uv build
          uv publish
